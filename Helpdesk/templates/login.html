{% extends 'base.html' %}

{% block content %}
<style>
    .login-container {
        min-height: 85vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
    }

    .brand-logo-circle {
        width: 40px;
        height: 40px;
        background: white;
        border-radius: 50%;
        display: inline-block;
        margin-right: 15px;
    }

    .hero-text {
        font-size: 4.5rem;
        font-weight: 400;
        margin-bottom: 0.5rem;
        background: linear-gradient(to bottom, #ffffff 0%, #a1a1aa 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    .sub-text {
        font-size: 1rem;
        color: #94a3b8;
        max-width: 500px;
        line-height: 1.6;
        margin-bottom: 3rem;
    }

    .glass-login-card {
        max-width: 420px;
        width: 100%;
        background: rgba(15, 23, 42, 0.4) !important;
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.1) !important;
        border-radius: 32px !important;
        padding: 40px;
    }

    .btn-luxury {
        background: white !important;
        color: black !important;
        border-radius: 50px !important;
        padding: 12px 30px !important;
        font-weight: 700 !important;
        letter-spacing: 1px;
        border: none !important;
        transition: all 0.3s ease;
    }

    .btn-luxury:hover {
        transform: scale(1.02);
        box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
    }

    .form-control-luxury {
        background: rgba(0, 0, 0, 0.2) !important;
        border: 1px solid rgba(255, 255, 255, 0.1) !important;
        color: white !important;
        border-radius: 12px !important;
        padding: 12px 15px !important;
    }

    .form-control-luxury:focus {
        border-color: #7c3aed !important;
        box-shadow: 0 0 0 2px rgba(124, 58, 237, 0.2) !important;
    }
</style>

<div class="login-container">
    <div class="mb-5 d-flex align-items-center justify-content-center">
        <div class="brand-logo-circle shadow-lg"></div>
        <span class="company-logo">COMPANY</span>
    </div>

    <h1 class="hero-text">Welcome.</h1>
    <p class="sub-text">Transforming helpdesk data into actionable intelligence with AI-driven sentiment analysis and
        voice transcription.</p>

    <div class="glass-login-card card border-0">
        <form method="POST">
            <div class="mb-3 text-start">
                <label class="form-label small text-muted text-uppercase tracking-wider fw-bold">Email address</label>
                <input type="email" class="form-control form-control-luxury" name="email" required
                    placeholder="admin@helpdesk.com">
            </div>
            <div class="mb-4 text-start">
                <div class="d-flex justify-content-between">
                    <label class="form-label small text-muted text-uppercase tracking-wider fw-bold">Password</label>
                </div>
                <input type="password" class="form-control form-control-luxury" name="password" required
                    placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-luxury w-100 mb-3">SIGN IN</button>
            <p class="text-muted small">Don't have an account? <a href="{{ url_for('signup') }}"
                    class="text-primary text-decoration-none">Sign Up</a></p>
        </form>
    </div>
</div>
{% endblock %}
